<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抽奖系统 - 女友电竞俱乐部</title>
<style>
body {
font-family: Arial, sans-serif;
text-align: center;
background-color: #1a1a1a;
color: #fff;
padding: 20px;
}
.button {
background-color: #ff6f61;
color: white;
padding: 10px 20px;
margin: 20px;
text-decoration: none;
border-radius: 5px;
font-size: 1.2em;
}
.button:hover {
background-color: #e55d50;
}
</style>
</head>
<body>
<h1>抽奖系统</h1>
<p>每人仅限抽奖一次，抽中折扣后需加入QQ群联系管理员使用。</p >
<button class="button" onclick="startLottery()">开始抽奖</button>
<p id="lottery-result"></p >
<a class="button" href=" ">返回主页</a >

<script>
function startLottery() {
// 检查用户是否已经抽奖过
if (localStorage.getItem('hasLottery') === 'true') {
document.getElementById('lottery-result').textContent = "您已经抽过奖了，不能重复抽奖。";
return;
}

const resultDisplay = document.getElementById('lottery-result');
const random = Math.random() * 100;
let result;
if (random <= 0.01) {
result = "恭喜您抽中免单！";
} else if (random <= 1.01) {
result = "恭喜您抽中五折优惠！";
} else if (random <= 41.01) {
result = "恭喜您抽中九折优惠！";
} else {
result = "恭喜您抽中九五折优惠！";
}
resultDisplay.textContent = result + " 请加入QQ群联系管理员使用。";

// 标记用户已经抽奖
localStorage.setItem('hasLottery', 'true');
}
</script>
</body>
</html>
